name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: |
          echo "Building with base path: /personal"
          npx astro build --base /personal
          cp public/robots-github.txt dist/robots.txt

      - name: Move files to /personal subfolder
        run: |
          echo "Moving build output to personal/ subfolder..."
          mkdir -p dist/temp
          mv dist/* dist/temp/ 2>/dev/null || true
          mkdir -p dist/personal
          mv dist/temp/* dist/personal/ 2>/dev/null || true
          rm -rf dist/temp
          echo "Files now in dist/personal/"
          ls -la dist/personal/ | head -20

      - name: Verify build output
        run: |
          echo "=== Files in dist/personal/ ==="
          ls -la dist/personal/
          echo "=== Checking for /personal/ in HTML ==="
          grep -r 'href="/personal/' dist/personal/ | head -5 || echo "⚠️ No /personal/ links found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'  # Upload entire dist/ (which now contains personal/)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
