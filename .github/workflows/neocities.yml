name: Deploy to Neocities

env:
  FORCE_COLOR: 1
  NODE_VERSION: lts/*

concurrency:
  group: deploy-to-neocities
  cancel-in-progress: true

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout the repository code
        uses: actions/checkout@v4
        
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
        
      - name: Get npm cache directory
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
        
      - name: Cache npm dependencies
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
        
      - name: Install dependencies and build site
        run: |
          npm ci
          npm run build
      
      - name: Verify build output
        run: ls -la dist/
      
      - name: Deploy to Neocities
        uses: bcomnes/deploy-to-neocities@v1.2.0  # ✅ Pin version (not @master)
        with:
          api_key: ${{ secrets.NEOCITIES_API_KEY }}  # ✅ No space!
          username: ${{ secrets.NEOCITIES_USERNAME }}  # ✅ Add username
          local_dir: dist  # ✅ Use local_dir (not dist_dir)
          preview: false  # ✅ Disable preview to avoid auth error
          cleanup: true